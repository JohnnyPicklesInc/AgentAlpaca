<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>All terminals · Agent Alpaca</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0e0e12" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/vendor/xterm.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><img src="/favicon.svg" alt="" /> Agent Alpaca</div>
    <div style="display:flex; gap:10px">
      <a class="btn btn-primary btn-sm" href="/app.html#pair" title="Pair a home machine">+ Add a bridge</a>
      <a class="btn btn-ghost btn-sm" href="/app.html" title="Session list">☰ List</a>
      <button class="btn btn-ghost btn-sm" id="logout">Sign out</button>
    </div>
  </header>

  <main class="wrap wrap-wide">
    <div class="grid-head">
      <div>
        <h2 style="margin:6px 0 2px">All terminals</h2>
        <p class="muted" style="margin-top:0">Every live session at once. Click a terminal to type into it.</p>
      </div>
    </div>
    <div id="grid" class="term-grid"></div>
    <div id="empty" class="empty" hidden>
      <p>No live sessions yet.</p>
      <p class="muted">Pair a machine, then run <span class="mono">alpaca -- claude</span> (or any command) on it.</p>
    </div>
  </main>

  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/addon-fit.js"></script>
  <script src="/grid.js"></script>
</body>
</html>
