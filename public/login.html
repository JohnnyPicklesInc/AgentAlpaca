<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Agent Alpaca</title>
  <meta name="description" content="Sign in to Agent Alpaca to watch your agents from anywhere." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#7c5cff" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="auth-card">
    <h1 style="margin-top:0">🦙 Sign in</h1>
    <p class="muted">Watch and drive your agents from anywhere. No password.</p>
    <a class="btn btn-primary" id="googleBtn" href="/api/auth/google/start" style="width:100%; display:inline-flex; align-items:center; justify-content:center; gap:10px">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#fff" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#fff" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#fff" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#fff" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg>
      Continue with Google
    </a>
    <button class="btn" id="passkeyBtn" hidden style="width:100%; margin-top:10px; align-items:center; justify-content:center; gap:8px">
      🔑 Sign in with a passkey
    </button>
    <div id="message"></div>
    <p class="muted small" id="signupRow" hidden style="margin-top:14px; text-align:center">
      New here? <a href="#" id="signupPasskey">Create an account with a passkey</a>
    </p>
    <p class="muted" style="margin-top:1.5rem"><a href="/">← Back home</a></p>
  </div>
  <script src="/vendor/simplewebauthn-browser.js"></script>
  <script type="module" src="/login.js"></script>
</body>
</html>
